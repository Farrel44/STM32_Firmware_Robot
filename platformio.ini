[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube

upload_protocol = stlink

monitor_speed = 115200

extra_scripts =
    pre:scripts/pio_linkflags.py

build_flags =
    -Iinclude
    -DUSE_CUSTOM_SYSTICK_HANDLER_IMPLEMENTATION=1
    -mfpu=fpv4-sp-d16
    -mfloat-abi=hard